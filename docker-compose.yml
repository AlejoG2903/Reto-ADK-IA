services:
  postgres:
    image: postgres:15
    container_name: mcp_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=America/Bogota
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  mcp_database:
    build: ./apps/mcp_servers/mcp_database
    container_name: mcp_database
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8001
    ports:
      - "8001:8001"

  mcp_filesystem:
    build: ./apps/mcp_servers/mcp_filesystem
    container_name: mcp_filesystem
    environment:
      - WORKSPACE_DIR=/workspace
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8002
    volumes:
      - ./workspace:/workspace
    ports:
      - "8002:8002"

  mcp_api:
    build: ./apps/mcp_servers/mcp_api
    container_name: mcp_api
    environment:
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8003
    ports:
      - "8003:8003"

  mcp_analitica:
    build: ./apps/mcp_servers/mcp_analitica
    container_name: mcp_analitica
    environment:
      - CAPACIDAD_TURNO=${CAPACIDAD_TURNO}
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8004
    ports:
      - "8004:8004"

  agente:
    build: ./apps/agente
    container_name: agente_clinica
    depends_on:
      mcp_database:
        condition: service_started
      mcp_filesystem:
        condition: service_started
      mcp_api:
        condition: service_started
      mcp_analitica:
        condition: service_started
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MCP_DATABASE_URL=http://mcp_database:8001
      - MCP_FILESYSTEM_URL=http://mcp_filesystem:8002
      - MCP_API_URL=http://mcp_api:8003
      - MCP_ANALITICA_URL=http://mcp_analitica:8004
      - TZ=America/Bogota
    volumes:
      - ./workspace:/workspace
    ports:
      - "8000:8000"  # Interfaz Web del ADK
      - "8005:8005"  # Puerto secundario / debug
    command: ["adk", "web", "--port", "8000", "--host", "0.0.0.0"]

volumes:
  pgdata: